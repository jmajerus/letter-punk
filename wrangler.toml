name = "letter-punk"
main = "src/worker.js"
compatibility_date = "2026-07-06"
workers_dev = true

[assets]
directory = "public"
not_found_handling = "single-page-application"
binding = "ASSETS"
# Invoke the Worker script for API and admin routes; assets are served directly otherwise.
run_worker_first = ["/api/*", "/admin", "/admin/*"]

[vars]
# Replace with your 32-character Cloudflare account ID (not a secret).
ACCOUNT_ID = "eec00739050a8a4cbf359a1dedb8cad3"

# Optional yearly puzzle storage in KV (recommended for /api/puzzles).
# Use keys like: puzzles:2026
# [[kv_namespaces]]
# binding = "PUZZLES_KV"
# id = "<your-kv-namespace-id>"
# preview_id = "<your-kv-preview-id>"

# Optional hourly cache for the /api/psa-feed awareness banner (ICRC/WHO).
# Without this binding, the route still works -- it just fetches the source
# feeds live on every request instead of serving a cached copy.
# [[kv_namespaces]]
# binding = "PSA_CACHE"
# id = "<your-kv-namespace-id>"
# preview_id = "<your-kv-preview-id>"

# Optional daily cache for the /api/import/letterboxed board importer (see
# src/letterboxedImport.js). Without this binding, the route still works --
# it just fetches the upstream hints page live on every request instead of
# once per day.
# [[kv_namespaces]]
# binding = "LETTERBOXED_IMPORT_CACHE"
# id = "<your-kv-namespace-id>"
# preview_id = "<your-kv-preview-id>"

# Optional storage for the Yesterday modal's "Player solutions" pool (a
# capped, deduplicated list of real solve word-chains per catalog date).
# Without this binding, /api/solutions always returns [] and the client
# simply shows no "Player solutions" section -- never an error.
[[kv_namespaces]]
binding = "SOLUTIONS_KV"
id = "e112afd9530848fab1f71d5d56803122"
preview_id = "e112afd9530848fab1f71d5d56803122"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "letter_punk_events"