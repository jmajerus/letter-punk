<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-hidden="true">
  <title>Pipe branch (T-joint)</title>
  <!-- Matches the real board pipe/joint rendering in boardRenderer.js
       (appendPipeSegment / appendPipeJoints) and its colors in styles.css
       (.board-pipe-shell/-core/-highlight, .board-pipe-joint-shell/-core,
       .board-pipe-valve-lines/-core) rather than an invented style: same
       shell/core/highlight triple stroke, same joint-circle-plus-valve
       treatment, just scaled down to icon size. Main line runs vertically
       (through-line of the manifold); the branch stub points right, off
       the main line, the same way a campaign link branches off the game. -->
  <path d="M16 3 V29 M16 16 H29" fill="none" stroke="#30383f" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  <path d="M16 3 V29 M16 16 H29" fill="none" stroke="#8d99a4" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  <path d="M16 3 V29 M16 16 H29" fill="none" stroke="#e4ebf1" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 5" opacity="0.74"/>

  <circle cx="16" cy="16" r="5.6" fill="#293036" opacity="0.96"/>
  <circle cx="16" cy="16" r="3.6" fill="#a0aab3" stroke="#dde5eb" stroke-width="0.8" opacity="0.98"/>
  <path d="M16 14.3 V17.7 M14.3 16 H17.7" stroke="#252c32" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="16" cy="16" r="0.9" fill="#cdd6dd" stroke="#505860" stroke-width="0.5"/>
</svg>
