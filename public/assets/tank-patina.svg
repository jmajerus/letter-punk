<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" role="img" aria-label="Patina pressure tank">
  <defs>

    <!-- Smooth cylindrical patina shading -->
    <linearGradient id="trueCylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29463d"/>
      <stop offset="7%" stop-color="#4f7667"/>
      <stop offset="25%" stop-color="#b5d0c3"/>
      <stop offset="40%" stop-color="#edf7f2"/>
      <stop offset="70%" stop-color="#8fb1a0"/>
      <stop offset="93%" stop-color="#456055"/>
      <stop offset="100%" stop-color="#22362f"/>
    </linearGradient>

    <!-- Shading for the top ellipse cap to match the light source -->
    <linearGradient id="topCapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2fbf6"/>
      <stop offset="40%" stop-color="#d6ebe2"/>
      <stop offset="80%" stop-color="#7da394"/>
      <stop offset="100%" stop-color="#3f5d52"/>
    </linearGradient>
  </defs>

  <path d="M 70,120 
           A 130,32 0 0,0 330,120 
           L 330,320 
           A 130,32 0 0,1 70,320 
           Z" 
        fill="url(#trueCylinderGrad)" />

  <ellipse cx="200" cy="120" rx="130" ry="32" fill="url(#topCapGrad)" stroke="#f3fbf6" stroke-width="0.5" opacity="0.84"/>
  <ellipse cx="200" cy="320" rx="130" ry="32" fill="#0f211c" opacity="0.28"/>
  <g fill="#e7f5ef" fill-opacity="0.34">
    <circle cx="118" cy="132" r="4"/>
    <circle cx="118" cy="300" r="4"/>
    <circle cx="282" cy="132" r="4"/>
    <circle cx="282" cy="300" r="4"/>
  </g>
</svg>
