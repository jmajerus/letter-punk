<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" role="img" aria-label="Silver pressure tank">
  <defs>

    <!-- Smooth cylindrical metallic shading -->
    <linearGradient id="trueCylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a333c"/>
      <stop offset="7%" stop-color="#4d5c6b"/>
      <stop offset="25%" stop-color="#a3b4c4"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#8da0b0"/>
      <stop offset="93%" stop-color="#3d4954"/>
      <stop offset="100%" stop-color="#20272e"/>
    </linearGradient>

    <!-- Shading for the top ellipse cap to match the light source -->
    <linearGradient id="topCapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#cedae5"/>
      <stop offset="80%" stop-color="#7a8d9e"/>
      <stop offset="100%" stop-color="#3a4652"/>
    </linearGradient>
  </defs>

  <path d="M 70,120 
           A 130,32 0 0,0 330,120 
           L 330,320 
           A 130,32 0 0,1 70,320 
           Z" 
        fill="url(#trueCylinderGrad)" />

  <ellipse cx="200" cy="120" rx="130" ry="32" fill="url(#topCapGrad)" stroke="#ffffff" stroke-width="0.5" opacity="0.82"/>
  <ellipse cx="200" cy="320" rx="130" ry="32" fill="#13181d" opacity="0.26"/>
  <g fill="#e7eef6" fill-opacity="0.34">
    <circle cx="118" cy="132" r="4"/>
    <circle cx="118" cy="300" r="4"/>
    <circle cx="282" cy="132" r="4"/>
    <circle cx="282" cy="300" r="4"/>
  </g>
</svg>